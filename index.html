
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1>WEATHER</h1>
    <p>Enter a city name to get its weather information.</p>
    <div class="weather-container">
       <h2 id="city-name">Get Weather in seconds</h2>
       
    <form onsubmit="getweather(event)">
        <input type="text" id="city-input">
    </form>
    <button type="submit" class="button">Get Weather</button>
    <div class="weather-info">
         <h3 id="temperature">Temperature: </h3>
         <h3 id="description">Description: </h3>
       </div>
</div>
    
    <script src="https://cdn.jsdelivr.net/npm/axios@1.17.0/dist/axios.min.js"></script>
    <script src="./script.js"></script>
</body>
</html>
